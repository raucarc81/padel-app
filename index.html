const pairSum=(pair,players)=>{const d=players.find(p=>p.id===pair.derechaId),r=players.find(p=>p.id===pair.revesId);return(d?.points??0)+(r?.points??0);};
const checkPairs=(pairs,players)=>{const e=[];[1,2].forEach(t=>{const tp=pairs.filter(p=>p.turn===t);for(let i=0;i<tp.length-1;i++){if(!tp[i].derechaId||!tp[i].revesId||!tp[i+1].derechaId||!tp[i+1].revesId)continue;const s1=pairSum(tp[i],players),s2=pairSum(tp[i+1],players);if(s1<s2)e.push(`Turno ${t} Pareja ${tp[i].pairNum} (${s1}pts) < Pareja ${tp[i+1].pairNum} (${s2}pts)`);}});return e;};
const mkPairs=()=>[{turn:1,pairNum:1,derechaId:null,revesId:null,pairResult:null},{turn:1,pairNum:2,derechaId:null,revesId:null,pairResult:null},{turn:1,pairNum:3,derechaId:null,revesId:null,pairResult:null},{turn:2,pairNum:1,derechaId:null,revesId:null,pairResult:null},{turn:2,pairNum:2,derechaId:null,revesId:null,pairResult:null}];

// Normaliza partidos de versiones anteriores — añade campos que faltan
const normalizeMatch=m=>({
  id:m.id||genId(),
  date:m.date||"",
  team1:m.team1||"",
  team2:m.team2||"",
  isHome:m.isHome!==undefined?m.isHome:true,
  location:m.location||"",
  calledDerecha:Array.isArray(m.calledDerecha)?m.calledDerecha:[],
  calledReves:Array.isArray(m.calledReves)?m.calledReves:[],
  pairs:(Array.isArray(m.pairs)?m.pairs:mkPairs()).map(p=>({turn:p.turn||1,pairNum:p.pairNum||1,derechaId:p.derechaId||null,revesId:p.revesId||null,pairResult:p.pairResult||null})),
  result:m.result||null,
  status:m.status||"complete",
});
const calcScore=m=>{
  const active=(m.pairs||[]).filter(p=>p.derechaId&&p.revesId&&p.pairResult);
  if(!active.length)return null;
  const wins=active.filter(p=>p.pairResult==="win").length;
  const losses=active.filter(p=>p.pairResult==="loss").length;
  const hs=m.isHome?wins:losses,as=m.isHome?losses:wins;
  return{homeScore:hs,awayScore:as,wins,losses,label:`${hs}-${as}`,result:wins>losses?"win":losses>wins?"loss":null};
};
const calcPlayerStats=(player,matches)=>{
  const base=player.baseStats||{nC:0,nP:0,nW:0,nL:0};
  const done=matches.filter(m=>m.status==="complete");
  const isCalled=m=>(m.calledDerecha||[]).includes(player.id)||(m.calledReves||[]).includes(player.id);
  const myPair=m=>(m.pairs||[]).find(p=>(p.derechaId===player.id||p.revesId===player.id));
  const aC=done.filter(m=>isCalled(m)).length;
  const aP=done.filter(m=>{const p=myPair(m);return p&&(p.derechaId||p.revesId);}).length;
  const aW=done.filter(m=>{const p=myPair(m);return p&&(p.derechaId===player.id||p.revesId===player.id)&&p.pairResult==="win";}).length;
  const aL=done.filter(m=>{const p=myPair(m);return p&&(p.derechaId===player.id||p.revesId===player.id)&&p.pairResult==="loss";}).length;
  const nC=base.nC+aC,nP=base.nP+aP,nW=base.nW+aW,nL=base.nL+aL;
  return{nC,nP,nW,nL,pPl:nC?Math.round(nP/nC*100):0,pWi:nP?Math.round(nW/nP*100):0};
};
const shareWhatsApp=(m,players,club)=>{
  const rival=m.isHome?m.team2:m.team1;
  const sc=calcScore(m);
  let t=`🎾 *CONVOCATORIA — ${club}*\n\n`;
  t+=`📅 *Fecha:* ${m.date}\n`;
  t+=`🆚 *Rival:* ${rival||"—"}\n`;
  t+=`${m.isHome?"🏠 En casa":"✈️ Visitante"}\n`;
  t+=`📍 *Ubicación:* ${m.location||"—"}\n`;
  if(m.location)t+=`🗺️ ${locLink(m.location)}\n`;
  if(sc)t+=`\n📊 *Resultado:* ${sc.label} ${sc.result==="win"?"✅ GANADO":sc.result==="loss"?"❌ PERDIDO":"—"}\n`;
  t+=`\n*━━ PAREJAS ━━*\n`;
  [1,2].forEach(turn=>{
    const tp=m.pairs.filter(p=>p.turn===turn&&p.derechaId&&p.revesId);
    if(!tp.length)return;
    t+=`\n⏰ *${turn===1?"Primer turno (20:00h)":"Segundo turno"}*\n`;
    tp.forEach(p=>{
      const d=players.find(pl=>pl.id===p.derechaId),r=players.find(pl=>pl.id===p.revesId);

      t+=`  • P${p.pairNum}: ${d?.nick||shortName(d?.name||"")} / ${r?.nick||shortName(r?.name||"")}${res}\n`;
    });
  });

  window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(t)}`,"_blank");

  const [ready,setReady]=useState(false);
  const ref=useRef({club:CLUB_DEFAULT,players:[],matches:[],ligaData:INIT_LIGA});
  useEffect(()=>{
    const unsub=Storage.listen(data=>{
      if(data){
        const now=new Date(),sy=data.licYear||now.getFullYear();
        let ps=(data.players||INIT_PLAYERS).map(p=>{
          const init=INIT_PLAYERS.find(ip=>ip.id===p.id);
          const bs=p.baseStats;
          const hasStats=bs&&(bs.nC>0||bs.nP>0||bs.nW>0||bs.nL>0);
          return{licencia:true,sanction:null,...p,
            nick:p.nick||init?.nick||"",
            baseStats:hasStats?bs:(init?.baseStats||{nC:0,nP:0,nW:0,nL:0})
          };
        });
        if(now.getFullYear()>sy&&now.getMonth()===0)ps=ps.map(p=>({...p,licencia:false}));
        const c=data.club||CLUB_DEFAULT,m=(data.matches||[]).map(normalizeMatch),ld=data.ligaData||INIT_LIGA,tb=data.teamBase||{matches:0,wins:0,losses:0};
        setClub(c);setPlayers(ps);setMatches(m);setLigaData(ld);setTeamBase(tb);
        ref.current={club:c,players:ps,matches:m,ligaData:ld,teamBase:tb};
        setSynced(window._fbReady===true);
      }else{
        setPlayers(INIT_PLAYERS);setLigaData(INIT_LIGA);setTeamBase({matches:0,wins:0,losses:0});
        ref.current={club:CLUB_DEFAULT,players:INIT_PLAYERS,matches:[],ligaData:INIT_LIGA,teamBase:{matches:0,wins:0,losses:0}};
      }
      setReady(true);
    });
    return unsub;
  },[]);
  const persist=useCallback((ov={})=>{const d={...ref.current,...ov,licYear:new Date().getFullYear()};ref.current=d;Storage.save(d);},[]);
  const setP=p=>{setPlayers(p);persist({players:p});};
  const setM=m=>{setMatches(m);persist({matches:m});};
  const setC=c=>{setClub(c);persist({club:c});};

function Wizard({match,players,club,onSave,onDone}){
  const mRef=useRef({...match});const [m,setM]=useState({...match});
  const [step,setStep]=useState(match.status==="setup"?1:match.status==="called"?2:3);
  const upd=ch=>{const next={...mRef.current,...ch};mRef.current=next;setM(next);onSave(next);};
  const STEPS=["","Datos del partido","Llamada","Parejas"];
  return(
    <div>
      <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:16,paddingTop:8}}>
        <button onClick={onDone} style={{background:"none",border:"none",cursor:"pointer",fontSize:26,color:G3,lineHeight:1}}>←</button>
        <div style={{flex:1}}>
          <div style={{fontFamily:"'Outfit',sans-serif",fontWeight:800,color:"#fff",fontSize:18}}>{STEPS[step]}</div>
          <div style={{display:"flex",gap:5,marginTop:7}}>{[1,2,3].map(s=><div key={s} style={{flex:1,height:4,borderRadius:4,background:step>=s?G4:"rgba(255,255,255,.12)",transition:"background .3s"}}/>)}</div>
        </div>

      {step===1&&<StepSetup m={m} club={club} onChange={upd} onNext={()=>{upd({status:"called"});setStep(2);}}/>}
      {step===2&&<StepCalled m={m} players={players} onChange={upd} onNext={()=>setStep(3)} onBack={()=>setStep(1)}/>}
      {step===3&&<StepPairs m={m} players={players} onChange={upd} onFinish={()=>{upd({status:"complete"});setTimeout(onDone,150);}} onBack={()=>setStep(2)}/>}
    </div>
  );
}

function StepCalled({m,players,onChange,onNext,onBack}){

  const remFrom=(id,side)=>{if(side==="d")onChange({calledDerecha:m.calledDerecha.filter(x=>x!==id)});else onChange({calledReves:m.calledReves.filter(x=>x!==id)});};
  const Col=({side})=>{
    const ids=side==="d"?m.calledDerecha:m.calledReves;

          <div key={p.id} style={{background:colorL,border:`1px solid ${color}25`,borderRadius:10,padding:"6px 7px",marginBottom:4,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div><div style={{fontSize:12,fontWeight:600,color:DARK}}>{p.nick||shortName(p.name)}</div><div style={{fontSize:10,color,fontWeight:700}}>{p.points}pts</div></div>

      <div style={{fontSize:11,color:GREY,textAlign:"center",marginBottom:10}}>Posición libre por partido — añade donde juegue cada uno</div>
      <div style={{display:"flex",gap:10}}><button onClick={onBack} style={{...btnS("#e5e7eb","#374151"),flex:1}}>← Atrás</button><button onClick={onNext} style={{...btnS(),flex:2}}>Siguiente →</button></div>
    </div>
  );
}
function StepPairs({m,players,onChange,onFinish,onBack}){
  const errs=checkPairs(m.pairs,players);

    const pair=m.pairs[idx],sum=pairSum(pair,players),ok=pair.derechaId&&pair.revesId;
    const avD=cD.filter(p=>!uD.includes(p.id)||p.id===pair.derechaId),avR=cR.filter(p=>!uR.includes(p.id)||p.id===pair.revesId);

          <select value={pair.revesId||""} onChange={e=>setPF(idx,"revesId",e.target.value)} style={{...selS,flex:1,padding:"7px 8px",fontSize:12,background:BLUEL,border:`1.5px solid ${BLUE}40`}}><option value="">🔵 Revés...</option>{avR.map(p=><option key={p.id} value={p.id}>{p.nick||shortName(p.name)} ({p.points})</option>)}</select>

      {errs.length>0&&<div style={{background:REDL,border:`1.5px solid ${RED}30`,borderRadius:14,padding:"12px 14px",marginBottom:12}}><div style={{fontWeight:700,color:RED,fontSize:13,marginBottom:4}}>⚠️ Error en el orden de parejas:</div>{errs.map((e,i)=><div key={i} style={{fontSize:12,color:RED,marginTop:3}}>• {e}</div>)}</div>}

    </div>

function LigaTab({players,onUpdate,ligaData,onLigaSave}){
  const [editing,setEditing]=useState(false);
  const [ligaEdit,setLigaEdit]=useState(ligaData);
  const [showPaste,setShowPaste]=useState(false);
  const [pasteText,setPasteText]=useState("");
  const [pasteMsg,setPasteMsg]=useState(null);
  const [msg,setMsg]=useState(null);
  const [loadingP,setLoadingP]=useState(false);
  const saveTable=()=>{onLigaSave(ligaEdit);setEditing(false);setMsg({type:"ok",text:"✅ Clasificación guardada"});};
  const addRow=()=>setLigaEdit(t=>[...t,{pos:t.length+1,name:"NUEVO EQUIPO",pj:0,pg:0,pp:0,sg:0,sp:0,pts:0,san:0,total:0}]);
  const delRow=i=>setLigaEdit(t=>t.filter((_,idx)=>idx!==i).map((r,idx)=>({...r,pos:idx+1})));
  const setCell=(i,k,v)=>setLigaEdit(t=>t.map((r,idx)=>idx===i?{...r,[k]:k==="name"?v:Number(v)||0}:r));
  const parsePaste=()=>{
    if(!pasteText.trim()){setPasteMsg({type:"err",text:"Pega el texto primero"});return;}
    const lines=pasteText.trim().split("\n").map(l=>l.trim()).filter(l=>l.length>2);
    const rows=[];
    for(const line of lines){
      const parts=line.split(/\t+|\s{2,}/).map(p=>p.trim()).filter(p=>p.length>0);
      if(parts.length<5)continue;
      if(!/^\d+$/.test(parts[0]))continue;
      const pos=parseInt(parts[0]);
      let numStart=1;
      while(numStart<parts.length&&!/^\d+$/.test(parts[numStart]))numStart++;
      if(numStart>=parts.length)continue;
      const name=parts.slice(1,numStart).join(" ").toUpperCase();
      const nums=parts.slice(numStart).map(n=>parseInt(n)||0);
      if(nums.length>=5&&name.length>1){
        rows.push({pos,name,pj:nums[0]||0,pg:nums[1]||0,pp:nums[2]||0,sg:nums[3]||0,sp:nums[4]||0,pts:nums[5]||0,san:nums[6]||0,total:nums[7]||nums[5]||0});
      }
    }
    if(rows.length===0){setPasteMsg({type:"err",text:"No se pudo leer. Asegúrate de copiar las filas completas con los números."});return;}
    rows.sort((a,b)=>a.pos-b.pos);
    onLigaSave(rows);
    setPasteMsg({type:"ok",text:`✅ ${rows.length} equipos importados correctamente`});
    setPasteText("");
    setTimeout(()=>{setShowPaste(false);setPasteMsg(null);},2500);
  };
  const syncPuntos=async()=>{
    setLoadingP(true);setMsg(null);
    try{
      const res=await fetch(PROXY+encodeURIComponent(FMP_TEAMS));if(!res.ok)throw new Error("HTTP "+res.status);
      const html=await res.text();const doc=new DOMParser().parseFromString(html,"text/html");const fmpData=[];
      doc.querySelectorAll("table tr").forEach(tr=>{const tds=tr.querySelectorAll("td");if(tds.length>=6){const nombre=(tds[2]?.textContent||"").trim(),ap1=(tds[3]?.textContent||"").trim(),pts=parseInt(tds[5]?.textContent||"0")||0;if(nombre&&ap1)fmpData.push({nombre,ap1,pts});}});
      if(fmpData.length>0){let updated=0;const np=players.map(p=>{const parts=p.name.split(" ");const match=fmpData.find(fd=>parts[0]&&fd.nombre.toLowerCase().includes(parts[0].toLowerCase())&&parts[1]&&fd.ap1.toLowerCase().includes(parts[1].toLowerCase()));if(match&&match.pts!==p.points){updated++;return{...p,points:match.pts};}return p;});if(updated>0){onUpdate(np);setMsg({type:"ok",text:`✅ ${updated} jugadores actualizados`});}else setMsg({type:"warn",text:"Sin cambios en puntos FMP"});}
      else setMsg({type:"warn",text:"⚠️ FMP bloqueó la petición. Usa el método de pegar texto."});
    }catch(e){setMsg({type:"err",text:"❌ FMP bloqueó la petición (CORS). Usa el método de pegar texto."});}
    setLoadingP(false);
  };
  const isOwn=name=>(name||"").toUpperCase().includes("LA NAVE")||(name||"").toUpperCase().includes("FOCH");
  const COLS=["Pos","Equipo","PJ","PG","PP","SG","SP","Pts","San","Total"];
  const KEYS=["pos","name","pj","pg","pp","sg","sp","pts","san","total"];
  return(
    <div>
      <STitle>Liga FMP</STitle>
      <div className="card" style={{borderLeft:`4px solid ${G5}`,marginBottom:12}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
          <div><div style={{fontWeight:700,color:DARK,fontSize:15}}>📋 Actualizar clasificación</div><div style={{fontSize:11,color:GREY,marginTop:2}}>Método recomendado — siempre funciona</div></div>
          <button onClick={()=>{setShowPaste(!showPaste);setPasteMsg(null);}} style={btnS(showPaste?AMBER:G6,undefined,12)}>{showPaste?"✕ Cerrar":"📋 Pegar tabla"}</button>
        </div>
        {showPaste&&(
          <div className="fade-in">
            <div style={{background:"#f0fdf4",border:"1.5px solid #d1fae5",borderRadius:12,padding:12,marginBottom:10}}>
              <div style={{fontWeight:700,color:G7,fontSize:13,marginBottom:6}}>Cómo hacerlo (30 segundos):</div>
              <div style={{fontSize:12,color:DARK,lineHeight:1.9}}>
                1️⃣ Abre <a href="https://www.fmpadel.com/ligas_clasificacion.aspx?idCategoria=135" target="_blank" rel="noreferrer" style={{color:BLUE,fontWeight:600}}>fmpadel.com → clasificación</a> en otro tab<br/>
                2️⃣ Selecciona todas las filas de la tabla (del 1 al último equipo)<br/>
                3️⃣ Copia con <b>Ctrl+C</b><br/>
                4️⃣ Pega aquí abajo con <b>Ctrl+V</b>
              </div>
            </div>
            <textarea value={pasteText} onChange={e=>setPasteText(e.target.value)}
              placeholder={"Pega aquí el texto copiado de FMP...\n\nVerás algo como:\n1  MAKINGPADEL A  19  16  3  152  69  69  0  69\n2  BAMVOLEA INDOOR PADEL TRAINING B  20  15  5..."}
              style={{width:"100%",height:130,border:"1.5px solid #d1fae5",borderRadius:12,padding:"10px 12px",fontSize:12,fontFamily:"monospace",outline:"none",resize:"vertical",background:"#fafafa",color:DARK,marginBottom:10}}/>
            {pasteMsg&&<div style={{borderRadius:8,padding:"8px 12px",fontSize:12,fontWeight:600,marginBottom:10,background:pasteMsg.type==="ok"?"#dcfce7":REDL,color:pasteMsg.type==="ok"?"#166534":RED}}>{pasteMsg.text}</div>}
            <button onClick={parsePaste} style={{...btnS(),width:"100%",padding:"12px",fontSize:14}}>⚡ Actualizar clasificación</button>
          </div>
        )}
      </div>
      <div className="card" style={{marginBottom:12}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div><div style={{fontWeight:700,color:DARK,fontSize:14}}>🔄 Sync puntos individuales FMP</div><div style={{fontSize:11,color:GREY,marginTop:1}}>Actualiza pts FMP de cada jugador</div></div>
          <button onClick={syncPuntos} disabled={loadingP} style={{...btnS(BLUE,undefined,12),opacity:loadingP?.6:1,minWidth:80}}>{loadingP?<span className="pulse">⏳</span>:"🔄 Sync"}</button>
        </div>
        {msg&&<div style={{borderRadius:8,padding:"8px 12px",fontSize:11,fontWeight:600,marginTop:10,background:msg.type==="ok"?"#dcfce7":msg.type==="warn"?AMBERL:REDL,color:msg.type==="ok"?"#166534":msg.type==="warn"?AMBER:RED}}>{msg.text}</div>}
      </div>
      <div className="card" style={{padding:"12px 8px"}}>
        <Row style={{marginBottom:10,padding:"0 6px"}}>
          <div><div style={{fontWeight:700,fontSize:15,color:DARK,fontFamily:"'Outfit',sans-serif"}}>Clasificación</div><div style={{fontSize:11,color:GREY}}>Liga Veteranos 2025/2026 · Primera División</div></div>
          <button onClick={()=>{setEditing(!editing);if(!editing)setLigaEdit([...ligaData]);}} style={btnS(editing?AMBER:G6,undefined,11)}>{editing?"✕ Cancelar":"✏️ Editar"}</button>
        </Row>
        <div style={{overflowX:"auto"}}>
          {editing?(
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:11}}>
              <thead><tr style={{background:G1}}>{COLS.map(c=><th key={c} style={{padding:"6px 3px",color:G7,fontWeight:700,borderBottom:"2px solid #d1fae5",textAlign:"left",whiteSpace:"nowrap"}}>{c}</th>)}<th></th></tr></thead>
              <tbody>
                {ligaEdit.map((row,ri)=>(<tr key={ri} style={{background:isOwn(row.name)?"#dcfce7":ri%2===0?"#fafafa":"#fff"}}>{KEYS.map(k=>(<td key={k} style={{padding:"3px 2px"}}>{k==="name"?<input value={row.name} onChange={e=>setCell(ri,"name",e.target.value)} style={{width:"100%",border:"1px solid #d1fae5",borderRadius:6,padding:"4px 5px",fontSize:11,background:"transparent",minWidth:100}}/>:<input type="number" value={row[k]} onChange={e=>setCell(ri,k,e.target.value)} style={{width:k==="pos"?30:42,border:"1px solid #d1fae5",borderRadius:6,padding:"4px 3px",fontSize:11,textAlign:"center",background:"transparent"}}/>}</td>))}<td><button onClick={()=>delRow(ri)} style={{background:"none",border:"none",color:RED,cursor:"pointer",fontSize:14,padding:"2px 4px"}}>✕</button></td></tr>))}
                <tr><td colSpan={COLS.length+1} style={{padding:"6px 0"}}><button onClick={addRow} style={{...btnS(G6,undefined,11),width:"100%"}}>+ Añadir equipo</button></td></tr>
              </tbody>
            </table>
          ):(
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
              <thead><tr style={{background:G1}}>{COLS.map(c=><th key={c} style={{padding:"7px 4px",color:G7,fontWeight:700,borderBottom:"2px solid #d1fae5",textAlign:"left",whiteSpace:"nowrap"}}>{c}</th>)}</tr></thead>
              <tbody>{ligaData.map((row,ri)=>(<tr key={ri} style={{background:isOwn(row.name)?"#dcfce7":ri%2===0?"#fafafa":"#fff",borderBottom:"1px solid #f3f4f6"}}><td style={{padding:"7px 4px",fontWeight:700,color:isOwn(row.name)?G7:DARK}}>{row.pos}</td><td style={{padding:"7px 4px",fontWeight:isOwn(row.name)?700:400,color:isOwn(row.name)?G7:DARK,maxWidth:160,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{row.name}{isOwn(row.name)&&" ★"}</td>{["pj","pg","pp","sg","sp","pts","san","total"].map(k=><td key={k} style={{padding:"7px 4px",textAlign:"center",color:isOwn(row.name)?G7:GREY,fontWeight:isOwn(row.name)?700:400}}>{row[k]}</td>)}</tr>))}</tbody>
            </table>
          )}
        </div>
        {editing&&<div style={{display:"flex",gap:10,marginTop:12,padding:"0 4px"}}><button onClick={()=>{setEditing(false);setLigaEdit(ligaData);}} style={{...btnS("#e5e7eb","#374151"),flex:1}}>Cancelar</button><button onClick={saveTable} style={{...btnS(),flex:2}}>💾 Guardar clasificación</button></div>}
      </div>
    </div>
  );
}
// MOUNT
ReactDOM.createRoot(document.getElementById("root")).render(
  React.createElement(ErrorBoundary, null, React.createElement(App))
);
if("serviceWorker" in navigator){window.addEventListener("load",()=>{navigator.serviceWorker.register("./sw.js").catch(e=>console.warn("SW:",e));});}
</script>
</body>
</html>
